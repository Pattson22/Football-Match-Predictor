<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Football Predictor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            /* --- UPDATED: Changed .jpg to .png --- */
            background-image: url("{{ url_for('static', filename='bbb.png') }}");
            background-size: cover; background-position: center;
            height: 100vh;
            display: flex;
            justify-content: flex-end;  /* This moves the box to the right */
            align-items: center;
            padding: 0 5vw;             /* Adds 5% padding on the right */
            box-sizing: border-box;     /* Includes padding in width/height */
            position: relative;
        }
        body::before {
            content: ''; position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Slightly less dark */
        }
        .login-container { /* Re-using the class */
            position: relative;
            background-color: rgba(255, 255, 255, 0.8); /* 80% opaque */
            backdrop-filter: blur(8px); /* Frosted glass effect */
            padding: 2rem 2.5rem;   /* Reduced padding */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%; max-width: 360px;       /* Made the box smaller */
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
        }
        h1 { color: #1c3d5a; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 0.75rem;
            border: 1px solid #ccc; border-radius: 5px;
            font-size: 1rem; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 0.75rem;
            background-color: #28a745; /* Green for register */
            color: white; border: none; border-radius: 5px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: #218838; }
        .links { margin-top: 1.5rem; color: #555; }
        .links a { color: #007bff; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .flash-error {
            padding: 1rem; background-color: #f8d7da;
            color: #721c24; border: 1px solid #f5c6cb;
            border-radius: 5px; margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Create Account</h1>

        {% with messages = get_flashed_messages(category_filter=['error']) %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</body>
</html>
